name: Probot

on:
  issues:
    types: [labeled]
  # Intentionally uses the unprivileged pull_request event, so this job will not
  # run on forks.
  pull_request:
    types: [labeled, ready_for_review]

jobs:
  auto-cc:
    runs-on: ubuntu-latest
    if: github.event_name == 'issue' || github.event.pull_request.draft == false
    timeout-minutes: 5
    steps:
      - uses: Lightning-AI/probot@v5
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          job: auto-cc
